  // so the diagonal mirror produces a coherent fold.
  //
  // Each entity cell is { dx, dy, dist, ink } where dist is the
  // *Euclidean* distance from center, used for the unmask check.
  const cells = [];
  const seen = new Map();

  function addCell(dx, dy, ink) {
    let ox, oy;
    if (symmetry === 8) {
      // canonicalize into the seed octant (dx >= dy >= 0)
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);
      ox = Math.max(adx, ady);
      oy = Math.min(adx, ady);
    } else {
      // 4-fold: just first quadrant (absolute values)
      ox = Math.abs(dx);
      oy = Math.abs(dy);
    }
    if (ox > targetRadius || oy > targetRadius) return;
    const key = ox * 1024 + oy;
    if (seen.has(key)) return;
    seen.set(key, true);
    const dist = Math.sqrt(ox * ox + oy * oy);
    if (dist > targetRadius) return;
    cells.push({ dx: ox, dy: oy, dist, ink });
  }

  // ----- tendril generation -----
  // 3-5 tendrils growing within the seed region.
  const numTendrils = 3 + Math.floor(Math.random() * 3);

  function growTendril(x, y, heading, stepsLeft, branchBudget, maxReach) {
    let cx2 = x, cy2 = y;
    for (let s = 0; s < stepsLeft; s++) {
      heading += (Math.random() - 0.5) * 0.45;
      const dx = Math.cos(heading);
      const dy = Math.sin(heading);
      const ax = Math.abs(dx), ay = Math.abs(dy);
      let sx, sy;
      if (ax > ay * 2)       { sx = Math.sign(dx); sy = 0; }
      else if (ay > ax * 2)  { sx = 0; sy = Math.sign(dy); }
      else                   { sx = Math.sign(dx); sy = Math.sign(dy); }
      cx2 += sx;
      cy2 += sy;
      // bound by this tendril's own max reach (NOT the entity's full radius).
      // Different tendrils stop at different distances so the silhouette
      // isn't a perfect disc.
      const r = Math.sqrt(cx2 * cx2 + cy2 * cy2);
      if (r > maxReach) return;
      addCell(cx2, cy2, 1);
      if (branchBudget > 0 && Math.random() < 0.12) {
        const branchHeading = heading + (Math.random() < 0.5 ? -1 : 1) *
                              (Math.PI / 2 + (Math.random() - 0.5) * 0.6);
        // sub-branch inherits a slightly shorter reach
        growTendril(cx2, cy2, branchHeading, Math.max(4, Math.floor((stepsLeft - s) * 0.6)), branchBudget - 1, maxReach * 0.85);
      }
    }
  }

  // heading range depends on symmetry: 4-fold uses 0..π/2 (full first
  // quadrant); 8-fold uses 0..π/4 (seed octant).
  const headingMax = symmetry === 8 ? (Math.PI / 4) : (Math.PI / 2);
  for (let t = 0; t < numTendrils; t++) {
    const h = Math.random() * headingMax;
    // each tendril picks its own max reach — anywhere from 30% to 100%
    // of the full radius. Most stop short of the edge so the silhouette
    // isn't a perfect circle. The growth pattern still emanates from
    // center but the tips end at varying distances.
    const reachFrac = 0.3 + Math.random() * 0.7;
    const maxReach = targetRadius * reachFrac;
    const len = Math.floor(maxReach * (1.0 + Math.random() * 0.5));
    growTendril(0, 0, h, len, 2, maxReach);
  }

  // ----- nucleus -----
  // A small core dot at the center. Kept very small so the inside of
  // the entity isn't filled in black — the tendrils provide the body,
  // the core is just the visible "anchor" point.
  const coreRadius = targetRadius * (0.05 + Math.random() * 0.12);
  for (let dy = 0; dy <= Math.ceil(coreRadius); dy++) {
    const dxStart = symmetry === 8 ? dy : 0;
    for (let dx = dxStart; dx <= Math.ceil(coreRadius); dx++) {
      const r = Math.sqrt(dx * dx + dy * dy);
      if (r <= coreRadius) addCell(dx, dy, 1);
    }
  }

  // also always include the center cell so the entity has a nucleus
  addCell(0, 0, 1);

  // ----- icons along the structure -----
  // place 2-4 small stamps somewhere along the cells we've recorded.
  const anchorCells = cells.slice();
  if (anchorCells.length > 0) {
    const numIcons = 2 + Math.floor(Math.random() * 3);
    const iconSizes = [2, 3, 4].filter(s => s <= targetRadius && Stamps[s]);
    if (iconSizes.length > 0) {
      for (let i = 0; i < numIcons; i++) {
        const anchor = anchorCells[Math.floor(Math.random() * anchorCells.length)];
        const sz = iconSizes[Math.floor(Math.random() * iconSizes.length)];
        const variants = Stamps[sz];
        const stamp = variants[Math.floor(Math.random() * variants.length)];
        for (let sy = 0; sy < stamp.h; sy++) {
          for (let sx = 0; sx < stamp.w; sx++) {
            if (stamp.data[sy * stamp.w + sx]) {
              addCell(anchor.dx + sx, anchor.dy + sy, 1);
            }
          }
        }
      }
    }
  }

  entities.push({
    cx, cy,
    radius: targetRadius,
    cells,
    spawnBeat: beatCount,
    symmetry,
  });
}

// drawn each frame in the render loop, before the texture upload
function entityStep(now) {
  if (entities.length === 0) return;
  // beat-fractional time-since-spawn for smooth animation.
  // beatPhase = monotonic float "beats since startup", combining the
  // discrete beatCount with the fractional time since the last beat.
  const beatLen = 60000 / params.bpm;
  const sinceLastBeat = Math.max(0, Math.min(1, (now - lastBeatTime) / beatLen));
  const beatPhase = beatCount + sinceLastBeat;

  // current "stable" duration in beats (or a huge number if lifetime ∞)
  const stableBeats = params.lifetime >= LIFETIME_INFINITE
    ? 1e9
    : params.lifetime;

  for (let ei = entities.length - 1; ei >= 0; ei--) {
    const e = entities[ei];
    const age = beatPhase - e.spawnBeat;
    const totalLife = ENTITY_BIRTH_BEATS + stableBeats + ENTITY_DEATH_BEATS;
    if (age >= totalLife) {
      entities.splice(ei, 1);
      continue;
    }

    // determine phase + reveal-radius
    // visibleR is what the maxDist threshold is right now (in cells, fractional).
    // birth: 0 → radius
    // stable: radius
    // death: radius → 0 (but we mask outer cells, not shrink the visible disk)
    let phaseProgress; // [0..1] within current phase
    let phaseKind;     // 'birth' | 'stable' | 'death'
    if (age < ENTITY_BIRTH_BEATS) {
      phaseKind = 'birth';
      phaseProgress = age / ENTITY_BIRTH_BEATS;
    } else if (age < ENTITY_BIRTH_BEATS + stableBeats) {
      phaseKind = 'stable';
      phaseProgress = 1;
    } else {
      phaseKind = 'death';
      phaseProgress = (age - ENTITY_BIRTH_BEATS - stableBeats) / ENTITY_DEATH_BEATS;
    }

    // reveal threshold: a cell is "fully revealed" if its dist ≤ insideR,
    // and "fading" between insideR and outsideR (a 1-cell-wide dithered band).
    // For birth: reveal grows from 0 to radius+1.
    // For death: reveal shrinks from radius+1 down to 0.
    let revealR;
    if (phaseKind === 'birth') {
      revealR = phaseProgress * (e.radius + 1.5);
    } else if (phaseKind === 'stable') {
      revealR = e.radius + 1.5;
    } else {
      // death: reveal shrinks; outer cells should fade FIRST.
      // We invert: outsideMaxR shrinks from radius+1 down to 0.
      revealR = (1 - phaseProgress) * (e.radius + 1.5);
    }
    const featherWidth = 1.5; // cells at the boundary that get dithered

    // ----- KILL FIELD -----
    // Per-frame clearing of ink within an entity's gravity field. The kill
    // decision is *deterministic per cell* — using a spatial Bayer dither
    // rather than a random roll — so a given cell either always gets
    // killed or always doesn't, frame after frame. That prevents the
    // flicker you'd get from a probabilistic kill (where ink momentarily
    // appears in dithered-zone cells before being killed on a subsequent
    // frame).
    //
    // The kill threshold gradients with distance from the body: cells
    // close to the body always pass (always killed), cells near the
    // field edge always fail (never killed by this entity). The
    // transition is feathered by Bayer so the visible boundary is a
    // stipple rather than a hard circle.
    //
    // killStrength cubes phaseProgress during birth so the clearing
    // ramps in gently.
    if (phaseKind !== 'death') {
      let killStrength;
      if (phaseKind === 'birth') {
        killStrength = phaseProgress * phaseProgress * phaseProgress;
      } else {
        killStrength = 1.0;
      }
      const bodyR = e.radius;
      const killR = bodyR * 0.65;
      const kr = Math.ceil(killR);
      const kxMin = Math.max(0, e.cx - kr);
      const kxMax = Math.min(GRID - 1, e.cx + kr);
      const kyMin = Math.max(0, e.cy - kr);
      const kyMax = Math.min(GRID - 1, e.cy + kr);
      // Inside killR every ink cell dies each frame (modulated by the
      // birth strength ramp). No Bayer dither on the kill itself —
      // dithered kill combined with active pull produced persistent ink
      // islands at the dither-fail cells. Visual softening at the boundary
      // comes naturally from variation in the pull rate (some cells get
      // pulled in faster than others, fuzzing the edge of the cleared
      // zone).
      for (let yy = kyMin; yy <= kyMax; yy++) {
        const dy = yy - e.cy;
        for (let xx = kxMin; xx <= kxMax; xx++) {
          const dx = xx - e.cx;
          const distSq = dx * dx + dy * dy;
          if (distSq > killR * killR) continue;
          const idx = yy * GRID + xx;
          if (grid[idx] >= 128) continue;
          if (Math.random() < killStrength) {
            grid[idx] = BG;
            expires[idx] = 0;
          }
        }
      }
    }

    // ----- paint the entity's cells -----
    // For each cell in the body, compute its cumulative "visibility" from
    // the threshold + bayer dither, and paint it onto the grid (with 4-fold
    // mirror) when visible.
    //
    // Note: we don't have the original underlying value to restore when
    // the entity disappears. That's by design — the entity owns whatever
    // cells it touches during its life. If something else paints over it
    // (corruption, stamp landing on top of it), that's fine; the entity
    // will repaint them on the next frame they're visible.
    for (let i = 0; i < e.cells.length; i++) {
      const c = e.cells[i];
      if (c.dist > revealR) continue;
      // dithered fade at the boundary
      let visible = true;
      const distFromEdge = revealR - c.dist;
      if (distFromEdge < featherWidth) {
        // map distFromEdge in [0, featherWidth] → bayer threshold [0, 64]
        const t = (distFromEdge / featherWidth) * 64;
        // pick bayer cell using the absolute world coords so the dither
        // pattern is stable in screen space
        const wx = (e.cx + c.dx) & 7;
        const wy = (e.cy + c.dy) & 7;
        const bayer = BAYER_8[wy * 8 + wx];
        if (t < bayer) visible = false;
      }
      if (!visible) continue;

      // Mirror per the entity's symmetry mode. 4-fold = H+V mirrors only
      // (4 paint positions); 8-fold = also diagonal swap (up to 8 positions).
      // Dedup the trivial cases (a==0 or b==0) so we don't overwrite.
      const a = c.dx, b = c.dy;
      paintEntityCell(e.cx + a, e.cy + b, c.ink, e);
      if (a !== 0)            paintEntityCell(e.cx - a, e.cy + b, c.ink, e);
      if (b !== 0)            paintEntityCell(e.cx + a, e.cy - b, c.ink, e);
      if (a !== 0 && b !== 0) paintEntityCell(e.cx - a, e.cy - b, c.ink, e);
      if (e.symmetry === 8 && a !== b) {
        // swap (a,b) → another four octants
        paintEntityCell(e.cx + b, e.cy + a, c.ink, e);
        if (b !== 0)            paintEntityCell(e.cx - b, e.cy + a, c.ink, e);
        if (a !== 0)            paintEntityCell(e.cx + b, e.cy - a, c.ink, e);
        if (a !== 0 && b !== 0) paintEntityCell(e.cx - b, e.cy - a, c.ink, e);
      }
    }
  }
}

function paintEntityCell(x, y, ink, e) {
  if (x < 0 || y < 0 || x >= GRID || y >= GRID) return;
  const idx = y * GRID + x;
  // If this cell has already been displaced by a band shift in the past,
  // never paint it again. The band took these pixels and moved them, so
  // the entity's "presence" at this position is permanently gone.
  if (e.displaced && e.displaced.has(idx)) return;
  // If a band is currently animating through this cell's row/column,
  // we yield the cell to the band — and record it in our displaced set
  // so we never repaint it once the band lands. This is what makes the
  // band visibly carry a chunk of the entity away rather than producing
  // a duplicate.
  for (let bi = 0; bi < bandShifts.length; bi++) {
    const b = bandShifts[bi];
    let inBand = false;
    if (b.horizontal) {
      if (y >= b.start && y < b.start + b.thickness) inBand = true;
    } else {
      if (x >= b.start && x < b.start + b.thickness) inBand = true;
    }
    if (inBand) {
      if (!e.displaced) e.displaced = new Set();
      e.displaced.add(idx);
      return;
    }
  }
  grid[idx] = ink ? INK : BG;
  if (ink) layer[idx] = LAYER_ENTITY;
  expires[idx] = 0;
}

// ===========================================================
// RADIAL PULSE — radial dithered ring pulses
// ===========================================================
//
// A pulse is a circular pattern of concentric ink/bg rings that grows
// outward from a center over 2 beats, then dissolves from the inside
// out over 2 more beats. Total life is 4 beats. The outer rings get
// progressively heavier dithering so the edges fizzle into nothing.
// During dissolve, an inner radius walks outward, eating the rings from
// the center. Both growth and dissolve use Bayer-dithered boundaries
// for that crunchy fade. The ring pattern itself scrolls outward
// continuously, so the pulse always feels like a traveling wave.
//
// As the outer radius expands during birth, a thin frontier band of
// cells gets its underlying grid value flipped — leaving a permanent
// inverted halo at the max reach. The halo is revealed during death
// as the inner fade exposes those cells from the inside out.
// ===========================================================

const pulses = [];
const PULSE_HARD_CAP = 6;
const PULSE_BIRTH_BEATS  = 2;
const PULSE_DEATH_BEATS  = 2;

// number of ring "wavelengths" across the radius. Higher = more rings.
const PULSE_RING_COUNT = 4;

// reuse the entity Bayer matrix for the dither
function tryTriggerPulse() {
  if (Math.random() < params.pulse * 0.5) {
    spawnPulse();
  }
}

function spawnPulse() {
  if (pulses.length >= PULSE_HARD_CAP) return;
  // wider scale range — from tiny dot pulses to medium ones.
  // Range scaled to 80% (0.05+0.131 → 0.04+0.105 → 0.032+0.084)
  // for v1.0 — pulses sat slightly large in busier compositions.
  const targetRadius = Math.floor(GRID * (0.032 + Math.random() * 0.084));
  if (targetRadius < 2) return;
  const margin = targetRadius + 2;
  if (GRID < margin * 2 + 2) return;

  // ----- pick center, honoring cluster and center bias -----
  let cx, cy;
  if (params.cluster > 0 && recentStamps.length > 0 && Math.random() < params.cluster) {
    const anchor = recentStamps[Math.floor(Math.random() * recentStamps.length)];
    const ax = Math.floor(anchor.nx * GRID);
    const ay = Math.floor(anchor.ny * GRID);
    const radius = Math.max(2, Math.floor(GRID * (0.25 - 0.15 * params.cluster)));
    cx = ax + Math.floor((Math.random() - 0.5) * 2 * radius);
    cy = ay + Math.floor((Math.random() - 0.5) * 2 * radius);
  } else if (params.center > 0 && Math.random() < params.center) {
    const gridCx = GRID / 2;
    const gridCy = GRID / 2;
    const t = 1 - params.center;
    const sigma = (GRID * 0.5) * (t * t);
    cx = Math.floor(gridCx + ((Math.random() + Math.random()) - 1) * sigma);
    cy = Math.floor(gridCy + ((Math.random() + Math.random()) - 1) * sigma);
  } else {
    cx = margin + Math.floor(Math.random() * (GRID - margin * 2));
    cy = margin + Math.floor(Math.random() * (GRID - margin * 2));
  }
  cx = clamp(cx, margin, GRID - margin - 1);
  cy = clamp(cy, margin, GRID - margin - 1);

  pulses.push({
    cx, cy,
    radius: targetRadius,
    spawnBeat: beatCount,
    spawnTime: performance.now(),
    displaced: null,
    invertedSet: null, // cells already flipped by the perimeter pass; populated lazily
    maxOuterReached: 0, // tracks the deepest the outer radius has reached
  });
}

// Each frame, paint live pulses onto the grid based on current animation
// progress. Pulses fully own their footprint while alive.
function pulseStep(now) {
  if (pulses.length === 0) return;

  const beatLen = 60000 / params.bpm;
  const sinceLastBeat = Math.max(0, Math.min(1, (now - lastBeatTime) / beatLen));
  const beatPhase = beatCount + sinceLastBeat;
  const totalLife = PULSE_BIRTH_BEATS + PULSE_DEATH_BEATS;

  for (let pi = pulses.length - 1; pi >= 0; pi--) {
    const p = pulses[pi];
    const age = beatPhase - p.spawnBeat;
    if (age >= totalLife) {
      pulses.splice(pi, 1);
      continue;
    }

    // outerR: how far the pattern reaches outward right now.
    //   birth: 0 → radius (over 2 beats)
    //   death: stays at radius
    // innerR: where the inside-out fade has eaten up to.
    //   birth: 0
    //   death: 0 → radius (over 2 beats)
    let outerR, innerR;
    if (age < PULSE_BIRTH_BEATS) {
      outerR = (age / PULSE_BIRTH_BEATS) * (p.radius + 1.5);
      innerR = 0;
    } else {
      outerR = p.radius + 1.5;
      innerR = ((age - PULSE_BIRTH_BEATS) / PULSE_DEATH_BEATS) * (p.radius + 1.5);
    }

    // Constant outward ring motion: this phase scrolls forward over time
    // so the ink/bg bands move outward continuously throughout the pulse's
    // life, not just when its outer radius grows. ringPhase is in units
    // of "ring periods" advanced. Negative because higher dist - phase
    // means the pattern *appears* to move outward as phase increases.
    const elapsedSec = (now - p.spawnTime) / 1000;
    // ~3 rings per second of outward travel — readable but lively.
    const ringPhase = -elapsedSec * 3;

    paintPulse(p, outerR, innerR, ringPhase);
  }
}

function paintPulse(p, outerR, innerR, ringPhase) {
  const cx = p.cx, cy = p.cy;
  const R = p.radius;
  // bounding box to iterate
  const r0 = Math.ceil(outerR + 1);
  const xMin = Math.max(0, cx - r0);
  const xMax = Math.min(GRID - 1, cx + r0);
  const yMin = Math.max(0, cy - r0);
  const yMax = Math.min(GRID - 1, cy + r0);

  // the ring pattern: a sinusoidal wave of period (R / PULSE_RING_COUNT)
  // along the radial distance.
  const ringPeriod = R / PULSE_RING_COUNT;

  // perimeter inversion: any cell that the outer radius is *currently*
  // sweeping past gets its underlying grid value flipped exactly once.
  // We use a set on the pulse to remember which cells we've already
  // flipped so the same cell doesn't toggle back and forth as the
  // outer radius creeps over it. Result: a permanent inverted halo at
  // the maximum reach of the pulse, persisting after the pulse dies.
  const FRONTIER_WIDTH = 1.2;
  // only do new inversions while the outer radius is still expanding
  const expanding = outerR > p.maxOuterReached;
  if (expanding) p.maxOuterReached = outerR;

  for (let y = yMin; y <= yMax; y++) {
    for (let x = xMin; x <= xMax; x++) {
      const dx = x - cx;
      const dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // ----- perimeter inversion -----
      // cells at the leading edge of the expanding outer radius get
      // their underlying grid value flipped, exactly once.
      if (expanding &&
          dist > outerR - FRONTIER_WIDTH && dist <= outerR &&
          dist > p.radius - 1.5) {
        const idx = y * GRID + x;
        if (!p.invertedSet) p.invertedSet = new Set();
        if (!p.invertedSet.has(idx)) {
          p.invertedSet.add(idx);
          // flip this cell's ink/bg
          const wasInk = grid[idx] < 128;
          grid[idx] = wasInk ? BG : INK;
          if (!wasInk) layer[idx] = LAYER_EFFECT;
          // clear any expiry/tag — the cell is now in a "modified by
          // pulse" state, and we don't want it ageing or behaving as
          // a stamp cell anymore.
          expires[idx] = 0;
        }
      }

      // outside the current outer reach? skip painting (don't paint, leave whatever's there)
      if (dist > outerR) continue;
      // already eaten by the inside-out fade? skip
      if (dist < innerR) continue;

      // ----- ring pattern -----
      const wave = (dist / ringPeriod) + ringPhase;
      const phase = wave - Math.floor(wave); // [0, 1)
      const isInk = phase < 0.5;

      // ----- outer-edge dithering -----
      const edgeFrac = clamp((outerR - dist) / Math.max(1, R * 0.4), 0, 1);
      const bayerThreshold = edgeFrac * 64;
      const wx = x & 7;
      const wy = y & 7;
      const bayer = BAYER_8[wy * 8 + wx];
      if (bayer >= bayerThreshold) continue;

      // ----- inside-out fade boundary (during death) -----
      if (innerR > 0) {
        const insideFade = clamp((dist - innerR) / Math.max(1, R * 0.2), 0, 1);
        if (bayer >= insideFade * 64) continue;
      }

      paintPulseCell(x, y, isInk ? 1 : 0, p);
    }
  }
}

function paintPulseCell(x, y, ink, p) {
  const idx = y * GRID + x;
  // same band-displacement logic as entities — once a cell is yielded
  // to a band, it stays yielded
  if (p.displaced && p.displaced.has(idx)) return;
  for (let bi = 0; bi < bandShifts.length; bi++) {
    const b = bandShifts[bi];
    let inBand = false;
    if (b.horizontal) {
      if (y >= b.start && y < b.start + b.thickness) inBand = true;
    } else {
      if (x >= b.start && x < b.start + b.thickness) inBand = true;
    }
    if (inBand) {
      if (!p.displaced) p.displaced = new Set();
      p.displaced.add(idx);
      return;
    }
  }
  grid[idx] = ink ? INK : BG;
  if (ink) layer[idx] = LAYER_EFFECT;
  expires[idx] = 0;
}

// ===========================================================
// SQUARE PULSE — like radial pulse, but with Chebyshev (square) waves
// ===========================================================
//
// Identical lifecycle to radial pulse (animated outward bands, dithered
// edges, perimeter inversion, displacement-by-band semantics) but the
// "distance from center" metric is Chebyshev (max of |dx|, |dy|) instead
// of Euclidean. That produces concentric SQUARE rings instead of circles.
// Birth phase is shorter — 1 beat — to give it a snappier arrival.
// Death phase stays at 2 beats, matching radial pulse.
// ===========================================================

const squarePulses = [];
const SQ_PULSE_HARD_CAP = 6;
const SQ_PULSE_BIRTH_BEATS = 1;
const SQ_PULSE_DEATH_BEATS = 2;
const SQ_PULSE_RING_COUNT = 4;

function tryTriggerSquarePulse() {
  if (Math.random() < params.sqpulse * 0.5) {
    spawnSquarePulse();
  }
}

function spawnSquarePulse() {
  if (squarePulses.length >= SQ_PULSE_HARD_CAP) return;
  // matches radial pulse range — wide scale variation, from tiny to medium.
  // Same 80% scaling as radial pulse for v1.0.
  const targetRadius = Math.floor(GRID * (0.032 + Math.random() * 0.084));
  if (targetRadius < 2) return;
  const margin = targetRadius + 2;
  if (GRID < margin * 2 + 2) return;

  // ----- pick center, honoring cluster and center bias -----
  let cx, cy;
  if (params.cluster > 0 && recentStamps.length > 0 && Math.random() < params.cluster) {
    const anchor = recentStamps[Math.floor(Math.random() * recentStamps.length)];
    const ax = Math.floor(anchor.nx * GRID);
    const ay = Math.floor(anchor.ny * GRID);
    const radius = Math.max(2, Math.floor(GRID * (0.25 - 0.15 * params.cluster)));
    cx = ax + Math.floor((Math.random() - 0.5) * 2 * radius);
    cy = ay + Math.floor((Math.random() - 0.5) * 2 * radius);
  } else if (params.center > 0 && Math.random() < params.center) {
    const gridCx = GRID / 2;
    const gridCy = GRID / 2;
    const t = 1 - params.center;
    const sigma = (GRID * 0.5) * (t * t);
    cx = Math.floor(gridCx + ((Math.random() + Math.random()) - 1) * sigma);
    cy = Math.floor(gridCy + ((Math.random() + Math.random()) - 1) * sigma);
  } else {
    cx = margin + Math.floor(Math.random() * (GRID - margin * 2));
    cy = margin + Math.floor(Math.random() * (GRID - margin * 2));
  }
  cx = clamp(cx, margin, GRID - margin - 1);
  cy = clamp(cy, margin, GRID - margin - 1);

  squarePulses.push({
    cx, cy,
    radius: targetRadius,
    spawnBeat: beatCount,
    spawnTime: performance.now(),
    displaced: null,
    invertedSet: null,
    maxOuterReached: 0,
  });
}

function squarePulseStep(now) {
  if (squarePulses.length === 0) return;

  const beatLen = 60000 / params.bpm;
  const sinceLastBeat = Math.max(0, Math.min(1, (now - lastBeatTime) / beatLen));
  const beatPhase = beatCount + sinceLastBeat;
  const totalLife = SQ_PULSE_BIRTH_BEATS + SQ_PULSE_DEATH_BEATS;

  for (let pi = squarePulses.length - 1; pi >= 0; pi--) {
    const p = squarePulses[pi];
    const age = beatPhase - p.spawnBeat;
    if (age >= totalLife) {
      squarePulses.splice(pi, 1);
      continue;
    }

    let outerR, innerR;
    if (age < SQ_PULSE_BIRTH_BEATS) {
      outerR = (age / SQ_PULSE_BIRTH_BEATS) * (p.radius + 1.5);
      innerR = 0;
    } else {
      outerR = p.radius + 1.5;
      innerR = ((age - SQ_PULSE_BIRTH_BEATS) / SQ_PULSE_DEATH_BEATS) * (p.radius + 1.5);
    }

    const elapsedSec = (now - p.spawnTime) / 1000;
    const ringPhase = -elapsedSec * 3;

    paintSquarePulse(p, outerR, innerR, ringPhase);
  }
}

function paintSquarePulse(p, outerR, innerR, ringPhase) {
  const cx = p.cx, cy = p.cy;
  const R = p.radius;
  const r0 = Math.ceil(outerR + 1);
  const xMin = Math.max(0, cx - r0);
  const xMax = Math.min(GRID - 1, cx + r0);
  const yMin = Math.max(0, cy - r0);
  const yMax = Math.min(GRID - 1, cy + r0);

  const ringPeriod = R / SQ_PULSE_RING_COUNT;

  const FRONTIER_WIDTH = 1.2;
  const expanding = outerR > p.maxOuterReached;
  if (expanding) p.maxOuterReached = outerR;

  for (let y = yMin; y <= yMax; y++) {
    for (let x = xMin; x <= xMax; x++) {
      const dx = x - cx;
      const dy = y - cy;
      // Chebyshev distance produces square rings rather than circular
      const dist = Math.max(Math.abs(dx), Math.abs(dy));

      // ----- perimeter inversion (square frontier) -----
      if (expanding &&
          dist > outerR - FRONTIER_WIDTH && dist <= outerR &&
          dist > p.radius - 1.5) {
        const idx = y * GRID + x;
        if (!p.invertedSet) p.invertedSet = new Set();
        if (!p.invertedSet.has(idx)) {
          p.invertedSet.add(idx);
          const wasInk = grid[idx] < 128;
          grid[idx] = wasInk ? BG : INK;
          if (!wasInk) layer[idx] = LAYER_EFFECT;
          expires[idx] = 0;
        }
      }

      if (dist > outerR) continue;
      if (dist < innerR) continue;

      // ring pattern: sinusoidal wave along Chebyshev distance
      const wave = (dist / ringPeriod) + ringPhase;
      const phase = wave - Math.floor(wave);
      const isInk = phase < 0.5;

      // outer-edge dither
      const edgeFrac = clamp((outerR - dist) / Math.max(1, R * 0.4), 0, 1);
      const bayerThreshold = edgeFrac * 64;
      const wx = x & 7;
      const wy = y & 7;
      const bayer = BAYER_8[wy * 8 + wx];
      if (bayer >= bayerThreshold) continue;

      // inside-out fade dither (during death)
      if (innerR > 0) {
        const insideFade = clamp((dist - innerR) / Math.max(1, R * 0.2), 0, 1);
        if (bayer >= insideFade * 64) continue;
      }

      paintPulseCell(x, y, isInk ? 1 : 0, p);
    }
  }
}

// ===========================================================
// BAND SHIFT — animated displacement of a horizontal or vertical strip
// ===========================================================
//
// On a beat (with probability tied to the slider) we pick a strip,
// snapshot its contents, and animate the snapshot sliding to its
// destination over the course of one beat. The origin cells are blanked
// immediately so other systems (stamps, corruption, evolution, travel)
// can paint into the vacated space while the band is in flight.
//
// Each frame the in-flight band overwrites the cells along its current
// position — so it visually "scrubs" across whatever's underneath,
// covering things up briefly as it passes. When the animation ends, we
// do a single final write at the destination (with toroidal wrap) so
// the displaced cells land permanently in their new home, full state
// (ink/bg, expiration) preserved.
//
// Multiple bands can be in flight simultaneously without trampling each
// other (they each manage their own snapshot and frame writes).
// ===========================================================

const bandShifts = []; // active animations

function tryTriggerBandShift() {
  if (Math.random() >= params.bandshift * 0.5) return;
  if (GRID < 8) return;

  const horizontal = Math.random() < 0.5;
  const thickness = Math.max(2, Math.floor(GRID * (0.05 + Math.random() * 0.10)));
  const start = Math.floor(Math.random() * (GRID - thickness));
  const dirSign = Math.random() < 0.5 ? -1 : 1;
  const offsetMag = Math.max(2, Math.floor(GRID * (0.10 + Math.random() * 0.30)));
  const offset = dirSign * offsetMag;
  const N = GRID;

  // ----- snapshot the band's current contents -----
  // We store the cells as flat arrays length = thickness * N.
  // Layout for horizontal: snap[(y - start) * N + x]
  // Layout for vertical:   snap[(x - start) * N + y]
  const snapGrid    = new Uint8Array(thickness * N);
  const snapExpires = new Uint32Array(thickness * N);
  const snapLayer   = new Uint8Array(thickness * N);

  if (horizontal) {
    for (let y = start; y < start + thickness; y++) {
      const row = y * N;
      const off = (y - start) * N;
      for (let x = 0; x < N; x++) {
        snapGrid[off + x]    = grid[row + x];
        snapExpires[off + x] = expires[row + x];
        snapLayer[off + x]   = layer[row + x];
      }
    }
  } else {
    for (let x = start; x < start + thickness; x++) {
      const off = (x - start) * N;
      for (let y = 0; y < N; y++) {
        const i = y * N + x;
        snapGrid[off + y]    = grid[i];
        snapExpires[off + y] = expires[i];
        snapLayer[off + y]   = layer[i];
      }
    }
  }

  // animation duration: one beat in ms
  const duration = 60000 / params.bpm;

  bandShifts.push({
    horizontal, start, thickness, offset, N,
    snapGrid, snapExpires, snapLayer,
    startTime: performance.now(),
    duration,
    lastOff: -1, // sentinel: forces first frame to paint
  });
}

// ----- run each frame: paint the in-flight bands at their interpolated positions
// Implementation: every frame, the band re-paints its full row/column with its
// snapshot rotated by the current offset. No cleanup needed because each frame
// completely overwrites all cells in the band's footprint. Any stamps/corruption
// that landed inside the band's rows during the animation get covered up — the
// band is in the foreground while it's in flight.
function bandShiftStep(now) {
  if (bandShifts.length === 0) return;

  for (let bi = bandShifts.length - 1; bi >= 0; bi--) {
    const b = bandShifts[bi];
    const t = Math.min(1, (now - b.startTime) / b.duration);
    // linear progression — fits the pixelated, step-y aesthetic
    const rawOffset = Math.round(t * b.offset);
    const N = b.N;
    // normalize into [0, N) for our copy logic
    const off = ((rawOffset % N) + N) % N;
    const done = t >= 1;

    // ----- skip-frame optimization -----
    // The visible state of the band only changes when the integer cell
    // offset advances. At 60 FPS over a beat of e.g. 0.5s with a target
    // offset of 32 cells, that's ~30 frames painting only 32 unique
    // states. Roughly 1/3 of frames are redundant; skip them entirely.
    if (b.lastOff === off && !done) {
      continue;
    }
    b.lastOff = off;

    if (b.horizontal) {
      // For a horizontal band, each row is contiguous in memory, so we
      // can do the wraparound rotation as TWO bulk subarray.set() calls
      // instead of a per-cell loop:
      //   dest[off .. N)     = src[0 .. N-off)
      //   dest[0 .. off)     = src[N-off .. N)
      // That's the entire row in two memcpy-like ops per buffer.
      const N_minus_off = N - off;
      for (let y = b.start; y < b.start + b.thickness; y++) {
        const row = y * N;
        const sOff = (y - b.start) * N;

        // grid
        const sg1 = b.snapGrid.subarray(sOff, sOff + N_minus_off);
        const sg2 = b.snapGrid.subarray(sOff + N_minus_off, sOff + N);
        grid.set(sg1, row + off);
        if (off > 0) grid.set(sg2, row);

        // expires
        const se1 = b.snapExpires.subarray(sOff, sOff + N_minus_off);
        const se2 = b.snapExpires.subarray(sOff + N_minus_off, sOff + N);
        expires.set(se1, row + off);
        if (off > 0) expires.set(se2, row);

        // layer
        const sl1 = b.snapLayer.subarray(sOff, sOff + N_minus_off);
        const sl2 = b.snapLayer.subarray(sOff + N_minus_off, sOff + N);
        layer.set(sl1, row + off);
        if (off > 0) layer.set(sl2, row);
      }
    } else {
      // For a vertical band, columns aren't contiguous in row-major
      // storage — we have to step by N each row. Per-cell loop, but
      // hoist the modulo-free math: split y into two ranges around the
      // wrap point so we avoid the modulo operation per cell.
      const yWrap = N - off; // dest y in [off, N) sources from y - off; [0, off) sources from y - off + N
      for (let x = b.start; x < b.start + b.thickness; x++) {
        const sOff = (x - b.start) * N;
        // first range: dest y in [off, N), source y' = y - off
        for (let y = off; y < N; y++) {
          const sy = y - off;
          const i = y * N + x;
          grid[i]      = b.snapGrid[sOff + sy];
          expires[i]   = b.snapExpires[sOff + sy];
          layer[i]     = b.snapLayer[sOff + sy];
        }
        // second range: dest y in [0, off), source y' = y - off + N = y + yWrap
        for (let y = 0; y < off; y++) {
          const sy = y + yWrap;
          const i = y * N + x;
          grid[i]      = b.snapGrid[sOff + sy];
          expires[i]   = b.snapExpires[sOff + sy];
          layer[i]     = b.snapLayer[sOff + sy];
        }
      }
    }

    if (done) {
      bandShifts.splice(bi, 1);
    }
  }
}


let lastBeatTime = performance.now();
let lastEvolveTime = performance.now();
let lastExpireTime = performance.now();
let lastShiftTime = performance.now();
let beatIndicator = document.getElementById('beat');

function beatStep(now) {
  const interval = 60000 / params.bpm;
  while (now - lastBeatTime >= interval) {
    lastBeatTime += interval;
    onBeat();
  }
}

// Sub-beat tick that retires expired cells. Runs at EXPIRE_TICKS_PER_BEAT × BPM
// so that lifecycle decay is finer-grained than the beat — combined with the
// per-cell tick jitter applied at spawn, this turns the moment of expiration
// from a hard cutoff into a small, organic fade window.
function expireStep(now) {
  const interval = 60000 / (params.bpm * EXPIRE_TICKS_PER_BEAT);
  let safety = EXPIRE_TICKS_PER_BEAT * 4; // cap to avoid burst on bpm raise
  while (now - lastExpireTime >= interval && safety-- > 0) {
    lastExpireTime += interval;
    tickCount++;
    const N = GRID * GRID;
    for (let i = 0; i < N; i++) {
      const e = expires[i];
      if (e !== 0 && e <= tickCount) {
        grid[i] = BG;
        expires[i] = 0;
      }
    }
  }
}

// ===========================================================
// STAMP SHIFT — half-beat per-stamp cardinal nudges
// ===========================================================
//
// Runs at 2× BPM. For each living stamp, with probability params.shift,
// pick a random cardinal direction and shift if the destination is
// clear (per-cell test against the stamp's own pattern, allowing the
// stamp to overlap itself between old and new positions).
//
// Cells that other systems removed from the stamp's footprint are
// silently dropped: only cells currently INK in grid are erased on
// the move; only those that fit through the move are repainted at
// the new position. So a stamp slowly sheds cells over its life as
// the environment claims them, and the shift only carries what's
// still genuinely "the stamp."
//
// Lifetime: stamps prune when they age past params.lifetime or when
// every cell in their pattern is bg.
// ===========================================================

const SHIFT_TICKS_PER_BEAT = 2;
const SHIFT_DIRS = [[1,0], [-1,0], [0,1], [0,-1]];

// Map a stamp's source-cell (sx, sy) → grid (x, y), honoring flip+scale.
// This is the inverse "pattern → footprint" calculation the same way
// applyStamp/revealOneGlitchCell do it. Returns the upper-left of the
// scale×scale block; callers iterate (bx, by) over [0, scale) to fill.
function stampCellToGrid(s, sx, sy) {
  const x = s.gx + (s.flipX ? (s.stamp.w - 1 - sx) * s.scale : sx * s.scale);
  const y = s.gy + (s.flipY ? (s.stamp.h - 1 - sy) * s.scale : sy * s.scale);
  return [x, y];
}

// Pure validity query: how far can stamp s slide along the unit cardinal
// (dxUnit, dyUnit) — up to maxDistance — without the swept path running
// into foreign ink or off-grid? Returns 0 if even one cell is blocked.
//
// "Self-pass-through": cells that are part of the stamp's own current
// pattern footprint count as passable, so a stamp can slide through
// itself.
function findShiftDistance(s, dxUnit, dyUnit, maxDistance) {
  const { stamp, scale } = s;
  const w = stamp.w, h = stamp.h, data = stamp.data;

  // Currently-owned cells (pattern ink-cells that are still ink in grid).
  const owned = [];
  for (let sy = 0; sy < h; sy++) {
    for (let sx = 0; sx < w; sx++) {
      if (!data[sy * w + sx]) continue;
      const [x0, y0] = stampCellToGrid(s, sx, sy);
      for (let by = 0; by < scale; by++) {
        for (let bx = 0; bx < scale; bx++) {
          const x = x0 + bx, y = y0 + by;
          if (x < 0 || y < 0 || x >= GRID || y >= GRID) continue;
          const idx = y * GRID + x;
          if (grid[idx] < 128) owned.push({ idx, x, y });
        }
      }
    }
  }
  if (owned.length === 0) return 0;

  // Full pattern footprint at current position — for self-pass-through.
  const bodyAt = new Set();
  for (let sy = 0; sy < h; sy++) {
    for (let sx = 0; sx < w; sx++) {
      if (!data[sy * w + sx]) continue;
      const [x0, y0] = stampCellToGrid(s, sx, sy);
      for (let by = 0; by < scale; by++) {
        for (let bx = 0; bx < scale; bx++) {
          const x = x0 + bx, y = y0 + by;
          if (x < 0 || y < 0 || x >= GRID || y >= GRID) continue;
          bodyAt.add(y * GRID + x);
        }
      }
    }
  }

  // Walk distances from maxDistance down; first valid wins.
  outer:
  for (let d = maxDistance; d >= 1; d--) {
    // bounds check
    for (let i = 0; i < owned.length; i++) {
      const o = owned[i];
      const nx = o.x + dxUnit * d;
      const ny = o.y + dyUnit * d;
      if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID) continue outer;
    }
    // sweep validity
    for (let i = 0; i < owned.length; i++) {
      const o = owned[i];
      for (let k = 1; k <= d; k++) {
        const cx = o.x + dxUnit * k;
        const cy = o.y + dyUnit * k;
        const cidx = cy * GRID + cx;
        if (bodyAt.has(cidx)) continue;
        if (grid[cidx] >= 128) continue;
        continue outer;
      }
    }
    return d;
  }
  return 0;
}

// Move stamp s by exactly one cell along (dxUnit, dyUnit). Re-checks
// validity for this single step; returns true if executed. Used as the
// substep of an in-flight slide.
function executeUnitShift(s, dxUnit, dyUnit) {
  const { stamp, scale } = s;
  const w = stamp.w, h = stamp.h, data = stamp.data;

  // Owned cells.
  const owned = [];
  for (let sy = 0; sy < h; sy++) {
    for (let sx = 0; sx < w; sx++) {
      if (!data[sy * w + sx]) continue;
      const [x0, y0] = stampCellToGrid(s, sx, sy);
      for (let by = 0; by < scale; by++) {
        for (let bx = 0; bx < scale; bx++) {
          const x = x0 + bx, y = y0 + by;
          if (x < 0 || y < 0 || x >= GRID || y >= GRID) continue;
          const idx = y * GRID + x;
          if (grid[idx] < 128) owned.push({ idx, x, y });
        }
      }
    }
  }
  if (owned.length === 0) return false;

  // Body set for self-pass-through.
  const bodyAt = new Set();
  for (let sy = 0; sy < h; sy++) {
    for (let sx = 0; sx < w; sx++) {
      if (!data[sy * w + sx]) continue;
      const [x0, y0] = stampCellToGrid(s, sx, sy);
      for (let by = 0; by < scale; by++) {
        for (let bx = 0; bx < scale; bx++) {
          const x = x0 + bx, y = y0 + by;
          if (x < 0 || y < 0 || x >= GRID || y >= GRID) continue;
          bodyAt.add(y * GRID + x);
        }
      }
    }
  }

  // Validate single-step destination for each owned cell.
  for (let i = 0; i < owned.length; i++) {
    const o = owned[i];
    const nx = o.x + dxUnit;
    const ny = o.y + dyUnit;
    if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID) return false;
    const ndx = ny * GRID + nx;
    if (bodyAt.has(ndx)) continue;
    if (grid[ndx] >= 128) continue;
    return false; // foreign ink in the way
  }

  // Execute: snapshot, erase, paint at +1.
  const N = owned.length;
  const oldVals    = new Uint8Array(N);
  const oldLayers  = new Uint8Array(N);
  const oldExpires = new Uint32Array(N);
  for (let i = 0; i < N; i++) {
    const idx = owned[i].idx;
    oldVals[i]    = grid[idx];
    oldLayers[i]  = layer[idx];
    oldExpires[i] = expires[idx];
  }
  for (let i = 0; i < N; i++) {
    const idx = owned[i].idx;
    grid[idx]    = BG;
    expires[idx] = 0;
  }
  for (let i = 0; i < N; i++) {
    const o = owned[i];
    const ndx = (o.y + dyUnit) * GRID + (o.x + dxUnit);
    grid[ndx]    = oldVals[i];
    layer[ndx]   = oldLayers[i];
    expires[ndx] = oldExpires[i];
  }
  s.gx += dxUnit;
  s.gy += dyUnit;
  return true;
}

function stampShiftStep(now) {
  if (stamps.length === 0) {
    lastShiftTime = now;
    return;
  }

  // ----- per-frame: advance any in-flight slides one cell at a time -----
  // A stamp's `slide` object spreads its planned distance over a half-beat
  // (or however long the slide was sized for at planning time). We catch
  // up missed steps if frames stalled. Re-checks validity at each step:
  // if the grid changed under us (foreign ink appeared, or our cells got
  // erased), the slide ends gracefully.
  for (let i = 0; i < stamps.length; i++) {
    const s = stamps[i];
    if (!s.slide) continue;
    const sl = s.slide;
    while (sl.remaining > 0 && now - sl.lastStepTime >= sl.stepIntervalMs) {
      sl.lastStepTime += sl.stepIntervalMs;
      const ok = executeUnitShift(s, sl.dxUnit, sl.dyUnit);
      if (!ok) { sl.remaining = 0; break; }
      sl.remaining--;
    }
    if (sl.remaining <= 0) s.slide = null;
  }

  // ----- half-beat tick: prune dead stamps and plan new slides -----
  const interval = 60000 / (params.bpm * SHIFT_TICKS_PER_BEAT);
  let safety = SHIFT_TICKS_PER_BEAT * 4;
  while (now - lastShiftTime >= interval && safety-- > 0) {
    lastShiftTime += interval;

    // prune stamps whose lifetime has expired or whose pattern is fully
    // bg in grid (the environment took everything).
    const lifeBeats = params.lifetime;
    const infinite = lifeBeats >= LIFETIME_INFINITE;
    for (let i = stamps.length - 1; i >= 0; i--) {
      const s = stamps[i];
      const age = beatCount - s.spawnBeat;
      if (!infinite && age >= lifeBeats + 1) { stamps.splice(i, 1); continue; }
      let anyInk = false;
      const stamp = s.stamp;
      const w = stamp.w, h = stamp.h, data = stamp.data, scale = s.scale;
      outer:
      for (let sy = 0; sy < h && !anyInk; sy++) {
        for (let sx = 0; sx < w; sx++) {
          if (!data[sy * w + sx]) continue;
          const [x0, y0] = stampCellToGrid(s, sx, sy);
          for (let by = 0; by < scale; by++) {
            for (let bx = 0; bx < scale; bx++) {
              const x = x0 + bx, y = y0 + by;
              if (x < 0 || y < 0 || x >= GRID || y >= GRID) continue;
              if (grid[y * GRID + x] < 128) { anyInk = true; break outer; }
            }
          }
        }
      }
      if (!anyInk) { stamps.splice(i, 1); continue; }
    }

    // plan new slides on stamps that aren't already mid-slide.
    if (params.shift <= 0) continue;
    for (let i = 0; i < stamps.length; i++) {
      const s = stamps[i];
      if (s.slide) continue;          // already in motion
      if (Math.random() >= params.shift) continue;

      // ----- pick direction order, optionally biased by cluster / center -----
      // Like spawn placement, the shift planner can be pulled toward a
      // target. Cluster bias picks a random recent-stamp anchor; center
      // bias picks the grid center. With probability proportional to the
      // slider, we sort the 4 cardinal directions by how much each moves
      // the stamp's center toward the target. Otherwise, fall back to a
      // uniform random shuffle (the original behavior).
      //
      // The two biases are tried in priority order (cluster wins over
      // center if both fire), matching how the spawn / corruption / pulse
      // sites resolve the same pair of sliders.
      const dirOrder = [0, 1, 2, 3];
      const stampW = s.stamp.w * s.scale;
      const stampH = s.stamp.h * s.scale;
      let targetX = -1, targetY = -1; // grid coords; -1 = unbiased
      if (params.cluster > 0 && recentStamps.length > 0 &&
          Math.random() < params.cluster) {
        const a = recentStamps[Math.floor(Math.random() * recentStamps.length)];
        targetX = a.nx * GRID;
        targetY = a.ny * GRID;
      } else if (params.center > 0 && Math.random() < params.center) {
        targetX = GRID * 0.5;
        targetY = GRID * 0.5;
      }
      if (targetX >= 0) {
        // current stamp center
        const cx = s.gx + stampW * 0.5;
        const cy = s.gy + stampH * 0.5;
        const dx = targetX - cx;
        const dy = targetY - cy;
        // score each direction by how aligned its unit vector is with the
        // target direction. Larger = more attractive.
        const scores = [
          dx,    // dir 0: +x
          -dx,   // dir 1: -x
          dy,    // dir 2: +y
          -dy,   // dir 3: -y
        ];
        // small jitter so ties don't resolve identically every tick
        for (let k = 0; k < 4; k++) scores[k] += (Math.random() - 0.5) * 0.3;
        dirOrder.sort((a, b) => scores[b] - scores[a]);
      } else {
        // unbiased — Fisher-Yates shuffle (preserves prior behavior)
        for (let s2 = 3; s2 > 0; s2--) {
          const r = (Math.random() * (s2 + 1)) | 0;
          if (r !== s2) { const t = dirOrder[s2]; dirOrder[s2] = dirOrder[r]; dirOrder[r] = t; }
        }
      }

      for (let q = 0; q < 4; q++) {
        const [dxUnit, dyUnit] = SHIFT_DIRS[dirOrder[q]];
        const maxDist = (dxUnit !== 0) ? stampW : stampH;
        const d = findShiftDistance(s, dxUnit, dyUnit, maxDist);
        if (d > 0) {
          // Plan the slide: distribute d cells across one half-beat
          // window so the slide finishes before this stamp's next
          // chance to plan another. Subtract a bit of headroom so a
          // slow frame doesn't push the slide past the next planning
          // tick.
          const slideDuration = interval * 0.9;
          s.slide = {
            dxUnit, dyUnit,
            remaining: d,
            stepIntervalMs: slideDuration / d,
            lastStepTime: now,
          };
          break;
        }
      }
    }
  }
}

function evolveStep(now) {
  if (params.evolve <= 0) {
    // keep the timer "current" so it doesn't burst when you turn evolve back on
    lastEvolveTime = now;
    return;
  }
  const interval = 60000 / (params.bpm * params.evrate);
  let safety = 8; // cap iterations per frame
  while (now - lastEvolveTime >= interval && safety-- > 0) {
    lastEvolveTime += interval;
    evolveTick();
  }
}

// ========= COLLAPSE — selective falling-sand =========
// Ink cells tend to fall downward when the cell below is empty,
// stopping when they hit other ink (or the bottom of the grid). A
// drifting noise field gates *which* cells participate: where the field
// is high, ink falls; where it's low, ink stays. The slider controls
// both the threshold (more cells active at higher slider) and the noise
// scale (larger active patches at higher slider).
//
// Runs at 6× BPM so columns of ink visibly drop several cells per beat
// rather than teleporting. Uses bottom-up scan order so cells don't
// double-fall in a single tick.
//
// Cell state (ink/bg, expires) all moves with the cell when
// it falls — so falling stamps still expire on schedule, etc.
// =====================================================
let lastCollapseTime = performance.now();
let collapseT = 0; // animated noise time
const collapseBuf = { activity: null };

function collapseStep(now) {
  if (params.collapse <= 0) {
    lastCollapseTime = now;
    return;
  }
  const interval = 60000 / (params.bpm * 6); // 6× per beat
  let safety = 8;
  while (now - lastCollapseTime >= interval && safety-- > 0) {
    lastCollapseTime += interval;
    collapseTick();
  }
}

function collapseTick() {
  const N = GRID;
  const c = params.collapse; // 0..1

  // noise scale: at low collapse the field is high-frequency (lots of small
  // patches); at high collapse it's low-frequency (large patches). Squaring
  // the slider value makes the scale ramp up slowly through the low half
  // and accelerate through the upper half — so casual values keep things
  // small and precise, and you need to push the slider hard for big patches.
  const cSq = c * c;
  const noiseScale = (3.5 - 2.5 * cSq) / N;
  // threshold: above this noise value, cells are "active" (will try to fall).
  // Higher slider → lower threshold → more cells active. Curved so the low
  // end stays very sparse and activity ramps up later in the slider's range.
  const threshold = 0.75 - 0.55 * cSq; // 0.75 at c=0, 0.20 at c=1

  collapseT += 0.02;

  // ----- precompute coarse activity field (same trick as evolveTick) -----
  const COARSE = 4;
  const cw = Math.ceil(N / COARSE) + 1;
  const ch = Math.ceil(N / COARSE) + 1;
  if (!collapseBuf.activity || collapseBuf.activity.length < cw * ch) {
    collapseBuf.activity = new Float32Array(cw * ch);
  }
  const act2D = collapseBuf.activity;
  for (let cy = 0; cy < ch; cy++) {
    const yy = cy * COARSE;
    for (let cx = 0; cx < cw; cx++) {
      const xx = cx * COARSE;
      act2D[cy * cw + cx] = activityNoise(xx * noiseScale, yy * noiseScale, collapseT);
    }
  }

  // bottom-up scan so each cell falls at most once per tick
  // (a cell that falls from row Y to Y+1 won't immediately fall from Y+1
  // to Y+2 in the same tick, because we've already passed row Y+1 in our
  // scan order)
  //
  // Falling state model: a cell becomes "falling" the first time the noise
  // field activates it AND the cell below is empty. Once falling, it falls
  // every tick regardless of noise until it lands (cell below is ink) or
  // hits the floor — only then does the falling flag clear. This prevents
  // ink from stalling mid-air when it drifts into a calm noise patch.
  // Bottom row is implicitly "landed" — its falling flag is always cleared.
  for (let y = N - 2; y >= 0; y--) {
    // bilinear interp setup for this row
    const fy = y / COARSE;
    const cy0 = Math.floor(fy);
    const cy1 = cy0 + 1;
    const ty = fy - cy0;
    for (let x = 0; x < N; x++) {
      const i = y * N + x;
      // bg cells: clear any stale falling flag (cheap invariant maintenance,
      // means other systems don't need to touch falling[] when removing ink).
      if (grid[i] >= 128) {
        if (falling[i]) falling[i] = 0;
        continue;
      }

      // already-falling cell: skip the noise check, just try to fall.
      // not-yet-falling cell: gate on the noise activation field.
      if (!falling[i]) {
        // sample noise activity at this cell
        const fx = x / COARSE;
        const cx0 = Math.floor(fx);
        const cx1 = cx0 + 1;
        const tx = fx - cx0;
        const a00 = act2D[cy0 * cw + cx0];
        const a10 = act2D[cy0 * cw + cx1];
        const a01 = act2D[cy1 * cw + cx0];
        const a11 = act2D[cy1 * cw + cx1];
        const a = (a00 * (1 - tx) + a10 * tx) * (1 - ty) +
                  (a01 * (1 - tx) + a11 * tx) * ty;
        if (a < threshold) continue; // dormant patch
      }

      // is the cell below empty? if yes, fall and stay in falling state.
      // if no, we've landed — clear falling.
      const j = i + N;
      if (grid[j] >= 128) {
        // move ink + state down by one (carry color layer too)
        grid[j] = grid[i];
        expires[j] = expires[i];
        layer[j] = layer[i];
        falling[j] = 1; // continues falling next tick
        grid[i] = BG;
        expires[i] = 0;
        falling[i] = 0;
      } else {
        // landed on ink — stop falling
        falling[i] = 0;
      }
    }
  }

  // bottom row can never fall — clear any falling flags there so they don't
  // linger on cells that later have a bg cell open up below them via resize
  // or other edge-case grid changes. (Cheap; bottom row is a single line.)
  const bottom = (N - 1) * N;
  for (let x = 0; x < N; x++) {
    if (falling[bottom + x]) falling[bottom + x] = 0;
  }
}

// ========= ENTITY GRAVITY — surrounding ink streams inward and dissolves =========
// While an entity is alive (birth + stable phases), it exerts a gravitational
// pull on ink within an extended radius around it. Each tick, eligible cells
// get a chance to step one cell toward the entity's center (8-direction snap).
// Cells that arrive within 2 cells of the entity's body have a chance to
// dissolve — being "absorbed" by the creature. Effect: the area around an
// entity gets visibly scoured during its life — distant ink streams inward
// and disappears at the boundary.
//
// Gravity is OFF during the entity's death phase (the creature is itself
// disintegrating; it stops feeding). After the entity is gone, no field
// remains — the lasting effect is whatever pattern of consumption took
// place in the surroundings during life.
// =================================================================
let lastGravityTime = performance.now();

function entityGravityStep(now) {
  if (entities.length === 0) {
    lastGravityTime = now;
    return;
  }
  // ~4× per beat — fast enough to feel like a continuous stream but
  // quantized so the pull is stepwise / readable
  const interval = 60000 / (params.bpm * 4);
  let safety = 8;
  while (now - lastGravityTime >= interval && safety-- > 0) {
    lastGravityTime += interval;
    entityGravityTick();
  }
}

function entityGravityTick() {
  const beatLen = 60000 / params.bpm;
  const sinceLastBeat = Math.max(0, Math.min(1, (performance.now() - lastBeatTime) / beatLen));
  const beatPhase = beatCount + sinceLastBeat;
  const stableBeats = params.lifetime >= LIFETIME_INFINITE ? 1e9 : params.lifetime;

  // Pull-only pass. Kill logic now lives in entityStep so it runs every
  // frame (preventing flicker from systems that write ink mid-frame).
  // This pass only handles inward streaming — moving ink one step toward
  // each entity's center, with probability stronger closer to the body.
  for (let ei = 0; ei < entities.length; ei++) {
    const e = entities[ei];
    const age = beatPhase - e.spawnBeat;
    if (age < 0) continue;
    if (age >= ENTITY_BIRTH_BEATS + stableBeats) continue; // not in birth+stable
    let strength;
    if (age < ENTITY_BIRTH_BEATS) {
      strength = age / ENTITY_BIRTH_BEATS;
    } else {
      strength = 1.0;
    }

    const cx = e.cx;
    const cy = e.cy;
    const bodyR = e.radius;
    const killR = bodyR * 0.65;  // tighter than body — most tendrils stop short of the full radius
    const fieldR = bodyR * 1.4;  // pull extends beyond the kill zone so ink visibly streams in

    const r0 = Math.ceil(fieldR);
    const xMin = Math.max(0, cx - r0);
    const xMax = Math.min(GRID - 1, cx + r0);
    const yMin = Math.max(0, cy - r0);
    const yMax = Math.min(GRID - 1, cy + r0);

    for (let y = yMin; y <= yMax; y++) {
      const dy = y - cy;
      for (let x = xMin; x <= xMax; x++) {
        const dx = x - cx;
        const distSq = dx * dx + dy * dy;
        if (distSq > fieldR * fieldR) continue;
        // skip cells inside the kill zone — those are entityStep's
        // responsibility (and pulling them in further is moot)
        if (distSq <= killR * killR) continue;
        const i = y * GRID + x;
        if (grid[i] >= 128) continue;

        const dist = Math.sqrt(distSq);
        // pull probability: 1 at the kill boundary, 0 at field edge
        const t = (dist - killR) / Math.max(0.001, fieldR - killR);
        const pullFrac = 1 - t;
        if (Math.random() >= strength * 0.45 * pullFrac) continue;

        // 8-direction snap toward center.
        const ax = Math.abs(dx);
        const ay = Math.abs(dy);
        let sx, sy;
        if (ax > ay * 2)      { sx = -Math.sign(dx); sy = 0; }
        else if (ay > ax * 2) { sx = 0; sy = -Math.sign(dy); }
        else                  { sx = -Math.sign(dx); sy = -Math.sign(dy); }
        const nx = x + sx;
        const ny = y + sy;
        if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID) continue;

        const j = ny * GRID + nx;
        if (grid[j] < 128) {
          // Blocked: destination is ink (commonly an entity tendril cell or
          // earlier-pulled ink piling up at the inner field boundary). Rather
          // than letting cells stall here — which produces a visible ring of
          // buildup around the entity's silhouette — give blocked cells a
          // probability of dissolving. The closer to the kill zone (higher
          // pullFrac), the more likely they consume into the field. This
          // makes the inner field edge act like a soft event horizon.
          if (Math.random() < strength * 0.6 * pullFrac) {
            grid[i] = BG;
            expires[i] = 0;
          }
          continue;
        }
        grid[j] = grid[i];
        expires[j] = expires[i];
        layer[j] = layer[i];
        grid[i] = BG;
        expires[i] = 0;
      }
    }
  }
}

// ========= EVOLUTION RULE =========
// A loose, probabilistic Life-style update. Operates on a snapshot of
// the grid so updates don't cascade within a single tick.
//
//   - "ink" cells (value INK = 0) with very few ink neighbours tend to dissolve
//   - "bg" cells with the right number of ink neighbours have a chance to ignite
//   - dense clumps mostly stay put
//
// All transitions are gated by the global `evolve` slider (0..1) so the
// system can be dialled from "barely changes" to "boils visibly".
// ===================================
// ========= ACTIVITY NOISE =========
// 2D value noise sampled per-cell to modulate where evolution is active.
// Cheap, smooth, and the tile size scales with grid size so the visual
// feel is consistent regardless of resolution.
//
// We use a hashed gradient table so it's deterministic-ish without
// needing a full Perlin permutation table.

function _hash2(ix, iy) {
  // simple integer hash → [0, 1)
  let h = ix * 374761393 + iy * 668265263;
  h = (h ^ (h >>> 13)) * 1274126177;
  h = h ^ (h >>> 16);
  return (h >>> 0) / 4294967295;
}
function _smooth(t) { return t * t * (3 - 2 * t); }

// 2D value noise at fractional coords (fx, fy) in noise-space.
function valueNoise2(fx, fy) {
  const ix = Math.floor(fx), iy = Math.floor(fy);
  const tx = fx - ix, ty = fy - iy;
  const sx = _smooth(tx), sy = _smooth(ty);
  const a = _hash2(ix,     iy    );
  const b = _hash2(ix + 1, iy    );
  const c = _hash2(ix,     iy + 1);
  const d = _hash2(ix + 1, iy + 1);
  return (a * (1 - sx) + b * sx) * (1 - sy) +
         (c * (1 - sx) + d * sx) * sy;
}

// Two-octave noise for a slightly richer field (still cheap).
function activityNoise(fx, fy, ft) {
  // animate the field by offsetting the sample point with time —
  // gives a smoothly drifting effect rather than re-rolling each tick.
  const a = valueNoise2(fx + ft, fy - ft * 0.7);
  const b = valueNoise2(fx * 2.1 - ft * 0.4, fy * 2.1 + ft * 0.5) * 0.5;
  return (a + b) / 1.5; // ~0..1
}

// ========= EVOLUTION RULE — density flow =========
// The evolve parameter implements "gravitational" coalescence: ink cells
// drift toward regions where there's already more ink, so loose specks
// merge into clusters and clusters consolidate over time. This reads
// visibly different from travel (which is per-cell random walk) because
// the motion is *directed* by the surrounding density, not random.
//
// Per tick:
//   1. Build a coarse density field by counting ink in a 5x5 neighborhood
//      around every cell. This is a one-pass thing using a separable
//      box-blur trick (running sum across rows, then across columns).
//   2. For each active ink cell (gated by the noise field), look at its
//      8 neighbors and find the one with the highest density. With some
//      probability proportional to the density gradient, move the cell
//      one step in that direction. Cells in low-density areas feel a
//      strong pull; cells in dense centers barely move.
//   3. At higher evolve, allow occasional birth at cluster boundaries
//      (a bg cell adjacent to dense ink can ignite) — lets clusters grow
//      over time, not just consolidate. At low evolve, this is dialed
//      way down so total ink is roughly preserved.
//   4. Isolated cells (very low density) have a small chance of dissolving,
//      because in nature truly orphaned specks wouldn't survive.
// Modulated by the same drifting noise field so coalescence happens
// in patches rather than uniformly.
// ===================================
const evBuf = { arr: null, n: 0 };
const densityBuf = { arr: null, tmp: null, n: 0 };
let evolveT = 0;     // animated noise time (advances each tick)
let flowT = 0;       // animated curl-flow time (advances each tick, slightly slower)

const DENSITY_RADIUS = 2; // 5x5 neighborhood (radius 2)

// ----- compute density field -----
// densityBuf.arr[i] = count of ink cells in [x-r..x+r, y-r..y+r] for cell i.
// We compute it as two passes (horizontal then vertical) for O(N²) work
// instead of O(N² × kernel²).
function computeDensity(src, N) {
  if (densityBuf.n !== N) {
    densityBuf.arr = new Int16Array(N * N);
    densityBuf.tmp = new Int16Array(N * N);
    densityBuf.n = N;
  }
  const tmp = densityBuf.tmp;
  const out = densityBuf.arr;
  const r = DENSITY_RADIUS;

  // pass 1: horizontal — for each cell, sum ink count over [x-r..x+r] in its row
  for (let y = 0; y < N; y++) {
    const row = y * N;
    let sum = 0;
    // prime the window: count ink in [0..r]
    for (let k = 0; k <= r && k < N; k++) {
      if (src[row + k] < 128) sum++;
    }
    tmp[row + 0] = sum;
    for (let x = 1; x < N; x++) {
      // add the right edge entering window
      const xAdd = x + r;
      if (xAdd < N && src[row + xAdd] < 128) sum++;
      // remove the left edge leaving window
      const xRem = x - r - 1;
      if (xRem >= 0 && src[row + xRem] < 128) sum--;
      tmp[row + x] = sum;
    }
  }

  // pass 2: vertical — for each cell, sum tmp values over [y-r..y+r] in its column
  for (let x = 0; x < N; x++) {
    let sum = 0;
    for (let k = 0; k <= r && k < N; k++) {
      sum += tmp[k * N + x];
    }
    out[0 * N + x] = sum;
    for (let y = 1; y < N; y++) {
      const yAdd = y + r;
      if (yAdd < N) sum += tmp[yAdd * N + x];
      const yRem = y - r - 1;
      if (yRem >= 0) sum -= tmp[yRem * N + x];
      out[y * N + x] = sum;
    }
  }
}

function evolveTick() {
  const N = GRID;
  if (!evBuf.arr || evBuf.n !== N) {
    evBuf.arr = new Uint8Array(N * N);
    evBuf.n = N;
  }
  const src = evBuf.arr;
  src.set(grid);

  // density field over the snapshot
  computeDensity(src, N);
  const dens = densityBuf.arr;
  // max possible density count for a 5x5 = 25. We use this for normalization.
  const DENSITY_MAX = (DENSITY_RADIUS * 2 + 1) * (DENSITY_RADIUS * 2 + 1);

  const e = params.evolve;       // 0..1

  // tunables
  // Movement and dissolution scale up aggressively with the slider so
  // higher evolve produces visibly more activity. Growth scales up
  // gently (and is further gated by a denser-cluster requirement below)
  // so the canvas doesn't progressively black out — net ink stays
  // roughly conserved as cells migrate and reform rather than fill in.
  const pMoveBase     = 0.15 + 0.55 * e;   // 0.15 .. 0.70 — stronger clustering flow
  const pDissolveBase = 0.05 + 0.45 * e;   // 0.05 .. 0.50 — more aggressive cleanup of loners
  const pGrowBase     = 0.04 + 0.06 * e;   // 0.04 .. 0.10 — gentler ignition (was 0.04..0.22)
  // density required for a bg cell to even consider igniting. Scales up
  // with evolve so high-strength evolution needs a clearer cluster
  // frontier to grow into, rather than every loosely-populated patch
  // sprouting new ink.
  const growDensityMin = 5 + Math.floor(e * 4); // 5 .. 9 (out of 25)
  // Probability that an ink cell takes a curl-flow displacement step
  // instead of a density-gradient step this tick. At low evolve the
  // system stays in clustering mode; at high evolve, currents dominate
  // and clusters get visibly carried through swirls.
  // Curve: cubic ramp keeps the low end calm (gradient-clustering) but
  // pushes hard at the top so max evolve commits almost every cell to
  // the flow path each tick → a current-driven look rather than a
  // gradient-with-some-drift look.
  const flowFrac = e * e * (1.05 - 0.05 * e); // 0 .. 1.0 — saturates at top of slider

  // Noise scale: gently scales with the slider — at e=0 it's tight
  // (~3.5 cycles across the grid, lots of small patches), at e=1 it
  // loosens to ~2.0 cycles (bigger patches, broader influence). Subtle
  // change but it shapes the look of how evolution propagates.
  const noiseScale = (3.5 - 1.5 * e) / N;
  evolveT += 0.015;
  const threshold = 0.55 - 0.30 * e;   // 0.55 .. 0.25

  // ----- precompute coarse activity field -----
  // Sample noise at a coarser grid (every COARSE cells) and bilinearly
  // interpolate per-cell. Saves up to 16× the noise work on large grids.
  const COARSE = 4;
  const cw = Math.ceil(N / COARSE) + 1; // cols including right pad
  const ch = Math.ceil(N / COARSE) + 1; // rows including bottom pad
  if (!evBuf.activity || evBuf.activity.length < cw * ch) {
    evBuf.activity = new Float32Array(cw * ch);
  }
  const act2D = evBuf.activity;
  for (let cy = 0; cy < ch; cy++) {
    const yy = cy * COARSE;
    for (let cx = 0; cx < cw; cx++) {
      const xx = cx * COARSE;
      act2D[cy * cw + cx] = activityNoise(xx * noiseScale, yy * noiseScale, evolveT);
    }
  }

  // ----- precompute coarse curl-noise flow field -----
  // Sample a scalar noise potential N(x,y,t) on the coarse grid, then take
  // the perpendicular gradient → a divergence-free 2D vector field. Result
  // is large-scale circulating flow ("swirls") that drifts smoothly with
  // time. We sample N(x, y) and N(x+h, y) / N(x, y+h) at small spatial
  // step h to get the gradient via finite difference.
  //
  // Flow scale is fixed at ~2 cycles across the grid (independent of
  // noiseScale) so swirls remain large and readable regardless of evolve.
  // Time advance is a touch slower than evolveT so currents persist
  // visibly longer than the activity field's fluctuations.
  flowT += 0.012;
  // flowScale ramps with the slider, but counter-intuitively: at low evolve
  // we have a few large slow swirls (calm currents you barely notice), and
  // at high evolve we have many smaller, more turbulent eddies (chaotic
  // streaming, ink moving in lots of competing directions). Lower number
  // = bigger swirls. Earlier pass had this backwards — it produced grid-
  // spanning sweeps at max evolve, where users wanted "more visible motion"
  // rather than "everything dragged in the same direction".
  // ~2.0 cycles across grid at e=0 (a handful of big swirls) → ~4.0 cycles
  // at e=1 (turbulent, lots of small competing currents).
  const flowScale = (2.0 + 2.0 * e) / N; // 2.0 .. 4.0 cycles across grid
  const flowH = 1.0;          // finite-difference step in noise-space
  if (!evBuf.flowX || evBuf.flowX.length < cw * ch) {
    evBuf.flowX = new Float32Array(cw * ch);
    evBuf.flowY = new Float32Array(cw * ch);
  }
  const flowX2D = evBuf.flowX;
  const flowY2D = evBuf.flowY;
  for (let cy = 0; cy < ch; cy++) {
    const yy = cy * COARSE;
    for (let cx = 0; cx < cw; cx++) {
      const xx = cx * COARSE;
      // potential samples (use different time offsets so the field
      // animates organically rather than translating linearly)
      const n00 = valueNoise2(xx * flowScale + flowT,        yy * flowScale - flowT * 0.7);
      const nXh = valueNoise2((xx + flowH) * flowScale + flowT, yy * flowScale - flowT * 0.7);
      const nYh = valueNoise2(xx * flowScale + flowT,        (yy + flowH) * flowScale - flowT * 0.7);
      // curl: rotate gradient 90° → (∂N/∂y, -∂N/∂x)
      const dNdx = (nXh - n00) / flowH;
      const dNdy = (nYh - n00) / flowH;
      flowX2D[cy * cw + cx] =  dNdy;
      flowY2D[cy * cw + cx] = -dNdx;
    }
  }

  // 8-neighbor offsets for direction picking
  const NX = [-1, 0, 1, -1, 1, -1, 0, 1];
  const NY = [-1, -1, -1, 0, 0, 1, 1, 1];

  // Two-pass approach: collect movements, then apply.
  const moves = []; // [srcIdx, dstIdx]
  const dissolves = []; // src idx
  const births = []; // [idx]

  for (let y = 0; y < N; y++) {
    // bilinear interp setup for this row
    const fy = y / COARSE;
    const cy0 = Math.floor(fy);
    const cy1 = cy0 + 1;
    const ty = fy - cy0;
    for (let x = 0; x < N; x++) {
      // bilinear sample of activity from coarse grid
      const fx = x / COARSE;
      const cx0 = Math.floor(fx);
      const cx1 = cx0 + 1;
      const tx = fx - cx0;
      const a00 = act2D[cy0 * cw + cx0];
      const a10 = act2D[cy0 * cw + cx1];
      const a01 = act2D[cy1 * cw + cx0];
      const a11 = act2D[cy1 * cw + cx1];
      const a = (a00 * (1 - tx) + a10 * tx) * (1 - ty) +
                (a01 * (1 - tx) + a11 * tx) * ty;
      if (a < threshold) continue;
      const tNorm = (a - threshold) / (1 - threshold);
      // Activity exponent eases from 2.0 (sparse, sharp gating) at low evolve
      // to ~0.5 (broad, near-uniform) at max evolve. This is the real lever
      // for "currents feel tame" — at e=1 the squared tNorm pinned the
      // effective activity to ~0.25, capping pFlow no matter how high we
      // pushed flowBoost. With the exponent flattening, ink cells in any
      // active patch commit to flow steps at full strength.
      const actExp = 2.0 - 1.5 * e; // 2.0 .. 0.5
      const act = Math.pow(tNorm, actExp);

      const i = y * N + x;
      const isInk = src[i] < 128;
      const myDensity = dens[i];                    // 0..25 ish
      const myDensityNorm = myDensity / DENSITY_MAX; // 0..1

      if (isInk) {
        // Isolated speck check — the ink cell's own density (which includes
        // itself) is very low → it's lonely. Higher dissolve chance here.
        // Density of 1 means just this cell is ink in its 5x5 neighborhood.
        if (myDensity <= 2 && Math.random() < pDissolveBase * act) {
          dissolves.push(i);
          continue;
        }

        // Curl-flow displacement branch. With probability flowFrac the
        // cell tries to displace along the flow field instead of climbing
        // the density gradient. flowFrac scales with the slider so at low
        // evolve almost all motion is gradient-clustering, at high evolve
        // most motion is current-driven — the system shifts from settling
        // into blobs to streaming through visible currents.
        if (Math.random() < flowFrac) {
          // bilinear sample flow at this cell's location (reuses cx0/cy0/tx/ty
          // already computed above for activity)
          const fX = (flowX2D[cy0 * cw + cx0] * (1 - tx) + flowX2D[cy0 * cw + cx1] * tx) * (1 - ty) +
                     (flowX2D[cy1 * cw + cx0] * (1 - tx) + flowX2D[cy1 * cw + cx1] * tx) * ty;
          const fY = (flowY2D[cy0 * cw + cx0] * (1 - tx) + flowY2D[cy0 * cw + cx1] * tx) * (1 - ty) +
                     (flowY2D[cy1 * cw + cx0] * (1 - tx) + flowY2D[cy1 * cw + cx1] * tx) * ty;
          const fMag = Math.sqrt(fX * fX + fY * fY);
          if (fMag > 0.001) {
            // 8-direction snap from the flow vector — same scheme as diggers
            const aX = Math.abs(fX), aY = Math.abs(fY);
            let dx, dy;
            if (aX > aY * 2)      { dx = Math.sign(fX); dy = 0; }
            else if (aY > aX * 2) { dx = 0; dy = Math.sign(fY); }
            else                  { dx = Math.sign(fX); dy = Math.sign(fY); }
            // probability scales with: base movement, activity gating,
            // flow magnitude (so cells in calm regions barely move), and
            // an evolve-scaled boost so flow motion outruns gradient
            // motion at full slider — at e=1 the coefficient saturates
            // around 2.7× the gradient base, making currents the dominant
            // driver of motion. Magnitude saturation also lifts so weaker
            // gradients still drive a meaningful step rate.
            const flowBoost = 1.0 + 1.7 * e; // 1.0 .. 2.7
            const pFlow = pMoveBase * act * flowBoost * Math.min(1, fMag * 30);
            if (Math.random() < pFlow) {
              const nx = x + dx, ny = y + dy;
              if (nx >= 0 && ny >= 0 && nx < N && ny < N) {
                const dst = ny * N + nx;
                if (src[dst] >= 128) {
                  moves.push(i, dst);
                }
              }
            }
          }
          continue; // flow path taken — skip the gradient path this tick
        }

        // Density-flow: look at neighbors, find one with higher density.
        // Cells at the edge of a cluster will see a clear gradient toward
        // the cluster center. Cells already in the dense interior see
        // small differences and rarely move.
        // The gradient strength scales the move probability.
        let bestDir = -1;
        let bestDensity = myDensity;
        for (let d = 0; d < 8; d++) {
          const nx = x + NX[d];
          const ny = y + NY[d];
          if (nx < 0 || ny < 0 || nx >= N || ny >= N) continue;
          const ni = ny * N + nx;
          const nd = dens[ni];
          // tiebreaker: small random nudge so we don't get stuck oscillating
          if (nd + Math.random() * 0.5 > bestDensity) {
            bestDensity = nd;
            bestDir = d;
          }
        }
        if (bestDir < 0) continue; // already at local max — stay

        // Probability of moving this tick: base × activity × gradient strength.
        // gradient is normalized so a single-cell-difference still has a chance,
        // but big differences move with high probability.
        const gradient = (bestDensity - myDensity) / DENSITY_MAX;
        // Cells already in dense regions move less (they're "comfortable")
        const restingBias = 1 - myDensityNorm * 0.7;
        const pMove = pMoveBase * act * gradient * 4 * restingBias;
        if (Math.random() < pMove) {
          const dst = (y + NY[bestDir]) * N + (x + NX[bestDir]);
          // require destination be currently bg in the snapshot, OR
          // be an ink cell that's about to move out (we don't track that
          // perfectly; just allow into bg cells, the snapshot keeps it stable).
          if (src[dst] >= 128) {
            moves.push(i, dst);
          }
        }
      } else {
        // bg cell: maybe ignite if surrounded by enough ink. Use density
        // directly: if myDensity is high, we're in or near a cluster, and
        // a small chance of birth is what lets clusters grow.
        if (myDensity >= growDensityMin) {
          // probability scales with density above the threshold
          const fillP = (myDensity - growDensityMin) / DENSITY_MAX;
          if (Math.random() < pGrowBase * act * fillP) {
            births.push(i);
          }
        }
      }
    }
  }

  // ----- apply dissolves -----
  for (let k = 0; k < dissolves.length; k++) {
    const i = dissolves[k];
    grid[i] = BG;
    expires[i] = 0;
  }

  // ----- apply moves -----
  // We process moves in random order so that when two cells want the same
  // destination, the order is fair. Also: a destination might already be
  // claimed by a previous move in this tick, in which case the second
  // mover stays put.
  // Shuffle indexes
  const moveCount = moves.length / 2;
  for (let k = moveCount - 1; k > 0; k--) {
    const j = Math.floor(Math.random() * (k + 1));
    if (j !== k) {
      const a0 = k * 2, b0 = j * 2;
      const t1 = moves[a0], t2 = moves[a0 + 1];
      moves[a0] = moves[b0]; moves[a0 + 1] = moves[b0 + 1];
      moves[b0] = t1; moves[b0 + 1] = t2;
    }
  }

  for (let k = 0; k < moves.length; k += 2) {
    const srcIdx = moves[k];
    const dstIdx = moves[k + 1];
    // skip if source got dissolved this tick (shouldn't happen since we
    // wouldn't have queued a move for it, but be defensive) or if dest
    // is no longer bg (claimed by an earlier move this tick).
    if (grid[srcIdx] >= 128) continue;   // source no longer ink
    if (grid[dstIdx] < 128) continue;    // dest already claimed
    // migrate the cell — carry its expiration and color layer with it
    grid[dstIdx] = INK;
    expires[dstIdx] = expires[srcIdx];
    layer[dstIdx] = layer[srcIdx];
    grid[srcIdx] = BG;
    expires[srcIdx] = 0;
  }

  // ----- apply births -----
  for (let k = 0; k < births.length; k++) {
    const i = births[k];
    if (grid[i] < 128) continue;   // already turned ink (e.g. via a move)
    grid[i] = INK;
    expires[i] = scheduleExpiry(params.lifetime);
    // inherit color from a random adjacent ink neighbor so clusters stay
    // visually coherent. (We only get here when myDensity is high, so
    // there's almost certainly an ink neighbor.)
    let inherited = LAYER_STAMP;
    const x = i % N, y = (i / N) | 0;
    // 8-shuffled neighbor scan, take the first ink neighbor
    const order = [0, 1, 2, 3, 4, 5, 6, 7];
    // light shuffle
    for (let s = 7; s > 0; s--) {
      const r = (Math.random() * (s + 1)) | 0;
      if (r !== s) { const t = order[s]; order[s] = order[r]; order[r] = t; }
    }
    for (let q = 0; q < 8; q++) {
      const d = order[q];
      const nx = x + NX[d], ny = y + NY[d];
      if (nx < 0 || ny < 0 || nx >= N || ny >= N) continue;
      const ni = ny * N + nx;
      if (src[ni] < 128 && layer[ni] !== 0) {
        inherited = layer[ni];
        break;
      }
    }
    layer[i] = inherited;
  }
}

function onBeat() {
  beatCount++;

  // ----- spawn new stamps -----
  // chaos has two effects on stamp count:
  //  1. it widens the per-beat jitter (could be 0 stamps, could be many)
  //  2. occasional "burst" beats where the count is multiplied — gives
  //     chaotic flow visible peaks rather than just shimmer.
  const base = params.rate;
  const jitter = Math.floor(params.chaos * base * 1.5);
  let count = Math.max(0, base + Math.floor((Math.random() - 0.5) * 2 * jitter));
  if (params.chaos > 0.4 && Math.random() < (params.chaos - 0.4) * 0.3) {
    count = Math.floor(count * (2 + Math.random() * 3));
  }
  for (let i = 0; i < count; i++) spawnOne();

  // ----- maybe drop a bomb -----
  tryTriggerBomb();

  // ----- maybe band shift -----
  tryTriggerBandShift();

  // ----- maybe spawn an entity -----
  tryTriggerEntity();

  // ----- maybe spawn an energy pulse -----
  tryTriggerPulse();

  // ----- maybe spawn a square pulse -----
  tryTriggerSquarePulse();

  // visual beat blip
  beatIndicator.classList.add('flash');
  requestAnimationFrame(() => {
