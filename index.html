    requestAnimationFrame(() => beatIndicator.classList.remove('flash'));
  });
}

function fitCanvas() {
  // use visualViewport on mobile so address-bar resize is handled
  const vv = window.visualViewport;
  const w = vv ? vv.width  : window.innerWidth;
  const h = vv ? vv.height : window.innerHeight;
  // square that fits, with a sane floor in case layout returns 0 momentarily
  const size = Math.max(200, Math.floor(Math.min(w, h)));
  const px = Math.min(1024, size);
  canvas.width = px;
  canvas.height = px;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  gl.viewport(0, 0, px, px);
}
fitCanvas();
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', fitCanvas);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fitCanvas);
}

let frames = 0, fpsTime = performance.now(), fpsEl = document.getElementById('fps');

// --- Loop control ---------------------------------------------------------
// `render()` runs one full simulation+draw step. It no longer self-schedules
// — the outer scheduler does. This separation lets us pause cleanly when the
// iframe is off-screen or the tab is hidden, and supports the "soft gate"
// where a single seeded frame is drawn before the user clicks start.
//
// Resume strategy: when un-pausing we bump every last*Time tracker forward
// by the elapsed pause duration so beatStep / expireStep / evolveStep don't
// fire a catch-up burst. The visualizer effectively freezes its time
// origin while paused.
let rafId = 0;
let running = false;
let pausedAt = 0;

function render(now) {
  beatStep(now);
  expireStep(now);
  evolveStep(now);
  collapseStep(now);
  entityGravityStep(now);
  tendrilStep(now);
  tracerStep(now);
  diggerStep(now);
  bombStep(now);
  chaosGlitchStep(now);
  stampShiftStep(now);
  // band shift runs before entities so creatures sit on top of any
  // sliding strips — the band visibly passes behind the entity rather
  // than smearing the entity's own cells across the row.
  bandShiftStep(now);
  entityStep(now);
  pulseStep(now);
  squarePulseStep(now);

  drawOnce();

  frames++;
  if (now - fpsTime > 500) {
    fpsEl.textContent = Math.round((frames * 1000) / (now - fpsTime));
    frames = 0;
    fpsTime = now;
  }
}

// Just push the current grid + palette to the GPU and draw — no simulation.
// Used for the seeded-preview frame and any time we need to repaint without
// advancing time.
function drawOnce() {
  gl.useProgram(prog);
  gl.bindVertexArray(vao);
  uploadGrid();
  gl.uniform1i(uGrid, 0);
  gl.uniform1i(uLayer, 1);
  gl.uniform3fv(uColors, paletteFlat);
  gl.clearColor(1, 1, 1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.drawArrays(gl.TRIANGLES, 0, 6);
}

function loopFrame(now) {
  render(now);
  rafId = requestAnimationFrame(loopFrame);
}

function startLoop() {
  if (running) return;
  // If we've been paused, fast-forward our time anchors so we don't burst.
  if (pausedAt > 0) {
    const elapsed = performance.now() - pausedAt;
    lastBeatTime   += elapsed;
    lastEvolveTime += elapsed;
    lastExpireTime += elapsed;
    lastShiftTime  += elapsed;
    fpsTime        += elapsed;
    pausedAt = 0;
  }
  running = true;
  rafId = requestAnimationFrame(loopFrame);
}

function stopLoop() {
  if (!running) return;
  running = false;
  cancelAnimationFrame(rafId);
  rafId = 0;
  pausedAt = performance.now();
}

// --- Soft gate: seeded preview frame --------------------------------------
// Run the simulation forward over ~6 synthetic beats to seed the grid with
// stamps, expirations, and a touch of collapse settling. Draw once, leave
// the loop stopped. The play button starts the real-time loop.
function seedPreview() {
  const now = performance.now();
  // The frame budget for a warmup is small, but each step function is
  // already cheap. We fake monotonic time by stepping in small slices so
  // each step's internal "while (now - last >= interval)" loops fire the
  // right number of beats / ticks / evolves.
  const beatLen = 60000 / params.bpm;
  const totalMs = beatLen * 6;     // ~6 beats of warmup
  const sliceMs = beatLen / 8;     // 8 slices per beat is plenty
  const slices  = Math.ceil(totalMs / sliceMs);

  // Anchor every last*Time at a synthetic origin so our simulated `now`
  // values produce sensible deltas.
  const origin = now - totalMs;
  lastBeatTime   = origin;
  lastEvolveTime = origin;
  lastExpireTime = origin;
  lastShiftTime  = origin;

  for (let i = 1; i <= slices; i++) {
    const t = origin + i * sliceMs;
    beatStep(t);
    expireStep(t);
    evolveStep(t);
    collapseStep(t);
    entityGravityStep(t);
    tendrilStep(t);
    tracerStep(t);
    diggerStep(t);
    bombStep(t);
    chaosGlitchStep(t);
    stampShiftStep(t);
    bandShiftStep(t);
    entityStep(t);
    pulseStep(t);
    squarePulseStep(t);
  }

  drawOnce();

  // Mark "paused at now" so startLoop's resume math zero-shifts cleanly.
  pausedAt = performance.now();
}

// Boot: draw the preview, wait for the user.
seedPreview();

// --- Play button ----------------------------------------------------------
const playOverlay = document.getElementById('play-overlay');
let hasStarted = false;
function userStart() {
  if (hasStarted) return;
  hasStarted = true;
  playOverlay.classList.add('gone');
  // Remove from the DOM after the fade completes so it can't ever steal
  // pointer events from the canvas.
  setTimeout(() => playOverlay.remove(), 280);
  startLoop();
}
playOverlay.addEventListener('click', userStart);

// --- Auto-pause hooks -----------------------------------------------------
// Tab hidden: stop the loop. Pretty universal.
document.addEventListener('visibilitychange', () => {
  if (!hasStarted) return;
  if (document.hidden) {
    stopLoop();
  } else if (isOnScreen) {
    startLoop();
  }
});

// Off-screen pause:
// When this page is embedded in an iframe (Webflow embed), browsers fire
// the IntersectionObserver callback both when the iframe itself scrolls in
// the parent page AND when the user scrolls within the iframe. We observe
// the canvas (an element inside this document) against the default
// viewport — that's what propagates the parent-page scroll info into the
// iframe context.
let isOnScreen = true;
if ('IntersectionObserver' in window) {
  const io = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      isOnScreen = entry.isIntersecting;
      if (!hasStarted) continue;
      if (!isOnScreen) {
        stopLoop();
      } else if (!document.hidden) {
        startLoop();
      }
    }
  }, { threshold: 0 });
  io.observe(canvas);
}

function bindSlider(id, key, decimals = 0, onChange) {
  const el = document.getElementById(id);
  const out = document.getElementById('v-' + id);
  const update = () => {
    params[key] = parseFloat(el.value);
    out.textContent = decimals === 0
      ? Math.round(params[key])
      : params[key].toFixed(decimals);
    if (onChange) onChange(params[key]);
  };
  el.addEventListener('input', update);
  update();
}

// ===========================================================
// Color UI — pickers (bg + 3 ink layers) + Amiga-flavored presets
// ===========================================================
// pickerEls/hexEls are hoisted so the invert button handler can update
// the displayed colors when invert is pressed (invert reverses the slot
// order in the active palette, and the UI reflects that).
const pickerEls = [];
const hexEls = [];
(() => {
  const root = document.getElementById('color-section');
  const slotLabels = ['bg', 'layer 1', 'layer 2', 'layer 3'];

  for (let slot = 0; slot < 4; slot++) {
    const row = document.createElement('div');
    row.className = 'color-row';

    const label = document.createElement('span');
    label.className = 'color-label';
    label.textContent = slotLabels[slot];
    row.appendChild(label);

    const picker = document.createElement('input');
    picker.type = 'color';
    picker.value = paletteHex[slot];
    picker.addEventListener('input', () => {
      paletteHex[slot] = picker.value;
      hexEls[slot].textContent = picker.value.toUpperCase();
      rebuildPaletteFlat();
    });
    row.appendChild(picker);
    pickerEls.push(picker);

    const hex = document.createElement('span');
    hex.className = 'hex-readout';
    hex.textContent = paletteHex[slot].toUpperCase();
    row.appendChild(hex);
    hexEls.push(hex);

    root.appendChild(row);
  }

  // preset dropdown — was a tray of buttons but the names overflowed onto
  // each other on mobile; a native <select> handles long names cleanly
  // and is more thumb-friendly.
  const presetWrap = document.createElement('div');
  presetWrap.className = 'preset-wrap';
  const presetLbl = document.createElement('div');
  presetLbl.className = 'div-label';
  presetLbl.style.marginBottom = '6px';
  presetLbl.textContent = 'preset';
  presetWrap.appendChild(presetLbl);
  const sel = document.createElement('select');
  sel.className = 'preset-select';
  // first option is a "custom" placeholder that becomes selected when the
  // user starts edit individual color slots after picking a preset.
  const customOpt = document.createElement('option');
  customOpt.value = '__custom__';
  customOpt.textContent = '— custom —';
  sel.appendChild(customOpt);
  for (let i = 0; i < colorPresets.length; i++) {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = colorPresets[i].name;
    sel.appendChild(opt);
  }
  // default to first preset (matches paletteHex initial state)
  sel.value = '0';
  sel.addEventListener('change', () => {
    if (sel.value === '__custom__') return; // shouldn't normally fire from user
    const preset = colorPresets[parseInt(sel.value, 10)];
    for (let i = 0; i < 4; i++) {
      paletteHex[i] = preset.colors[i];
      pickerEls[i].value = preset.colors[i];
      hexEls[i].textContent = preset.colors[i].toUpperCase();
    }
    rebuildPaletteFlat();
  });
  presetWrap.appendChild(sel);
  root.appendChild(presetWrap);

  // when the user touches an individual picker, drop the preset selector
  // back to "custom" so we don't lie about which preset is active.
  for (const p of pickerEls) {
    p.addEventListener('input', () => { sel.value = '__custom__'; });
  }
})();

// invert button reverses the color palette (slot 0 ↔ slot 3, slot 1 ↔
// slot 2) and reflects this in the picker UI. The grid data is untouched
// — it's purely a remapping of which user-chosen color belongs to which
// layer. Pressing invert again reverses back to the original.
function invertPalette() {
  const reversed = [paletteHex[3], paletteHex[2], paletteHex[1], paletteHex[0]];
  for (let i = 0; i < 4; i++) {
    paletteHex[i] = reversed[i];
    pickerEls[i].value = reversed[i];
    hexEls[i].textContent = reversed[i].toUpperCase();
  }
  rebuildPaletteFlat();
}
document.getElementById('invertAll').addEventListener('click', invertPalette);

document.getElementById('clear').addEventListener('click', () => {
  grid.fill(BG);
  layer.fill(0);
  expires.fill(0);
  falling.fill(0);
  clearAllSystems();
});

document.getElementById('randomize').addEventListener('click', () => {
  const setSlider = (id, v, dec = 0) => {
    const el = document.getElementById(id);
    el.value = v;
    el.dispatchEvent(new Event('input'));
  };
  // bpm intentionally not randomized — it should track the user's
  // current tempo intent (tap-tempo, manual setting). Randomizing it
  // would constantly fight whatever rhythm the user is working with.
  setSlider('rate', Math.floor(1 + Math.random() * 12));
  setSlider('maxsize', Math.floor(3 + Math.random() * 17));
  setSlider('bias', Math.random().toFixed(2));
  setSlider('mirror', Math.random().toFixed(2));
  setSlider('shift', (Math.random() < 0.5 ? 0 : Math.random() * 0.5).toFixed(2));
  setSlider('chaos', Math.random().toFixed(2));
  setSlider('cluster', Math.random().toFixed(2));
  setSlider('center', (Math.random() < 0.5 ? 0 : Math.random()).toFixed(2));
  setSlider('corrupt', (Math.random() * 0.6).toFixed(2));
  setSlider('tracers', (Math.random() * 0.5).toFixed(2));
  setSlider('diggers', (Math.random() < 0.6 ? 0 : Math.random() * 0.4).toFixed(2));
  setSlider('bombs', (Math.random() < 0.5 ? 0 : Math.random() * 0.5).toFixed(2));
  setSlider('entity', (Math.random() < 0.6 ? 0 : Math.random() * 0.5).toFixed(2));
  setSlider('pulse', (Math.random() < 0.6 ? 0 : Math.random() * 0.6).toFixed(2));
  setSlider('sqpulse', (Math.random() < 0.6 ? 0 : Math.random() * 0.6).toFixed(2));
  setSlider('bandshift', (Math.random() < 0.5 ? 0 : Math.random() * 0.7).toFixed(2));
  // randomize lifetime: 30% chance infinite, otherwise 4..32 beats
  setSlider('lifetime', Math.random() < 0.3 ? LIFETIME_INFINITE : (4 + Math.floor(Math.random() * 28)));
  setSlider('evolve', (Math.random() * 0.7).toFixed(2)); // bias toward gentler evolve
  setSlider('evrate', (0.5 + Math.floor(Math.random() * 16) * 0.5).toFixed(2));
  setSlider('collapse', (Math.random() < 0.6 ? 0 : Math.random() * 0.7).toFixed(2));
});

// panel collapse
const panel = document.getElementById('panel');
const toggleBtn = document.getElementById('toggle');
const hideBtn = document.getElementById('hide-panel');
function setPanel(open) {
  panel.classList.toggle('collapsed', !open);
  toggleBtn.classList.toggle('show', !open);
}
hideBtn.addEventListener('click', () => setPanel(false));
toggleBtn.addEventListener('click', () => setPanel(true));

// tap tempo: pressing SPACE in rhythm averages recent intervals and sets bpm.
// Falls back to firing a single beat on the first tap (or after a long gap),
// so a single press still feels like a beat marker.
const TAP_RESET_MS = 2000;   // gap > this resets the tap window
const TAP_MAX_SAMPLES = 6;   // rolling window of intervals
let tapTimes = [];

function handleTap() {
  const now = performance.now();
  // drop stale taps
  if (tapTimes.length && now - tapTimes[tapTimes.length - 1] > TAP_RESET_MS) {
    tapTimes.length = 0;
  }
  tapTimes.push(now);
  if (tapTimes.length > TAP_MAX_SAMPLES + 1) tapTimes.shift();

  // need at least 2 taps to compute an interval
  if (tapTimes.length >= 2) {
    let sum = 0;
    for (let i = 1; i < tapTimes.length; i++) sum += tapTimes[i] - tapTimes[i - 1];
    const avgMs = sum / (tapTimes.length - 1);
    const bpm = Math.max(20, Math.min(300, Math.round(60000 / avgMs)));
    const el = document.getElementById('bpm');
    el.value = bpm;
    el.dispatchEvent(new Event('input'));
    // align the beat phase to the most recent tap so the tap *is* the beat
    lastBeatTime = now;
  } else {
    // first tap — just mark a beat
    onBeat();
    lastBeatTime = now;
  }
}

// hotkeys
window.addEventListener('keydown', e => {
  if (e.target.matches('input, select, textarea')) return;
  switch (e.key.toLowerCase()) {
    case 'h':
      setPanel(panel.classList.contains('collapsed'));
      break;
    case 'f':
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
      break;
    case ' ':
      e.preventDefault();
      handleTap();
      break;
    case 'c':
      grid.fill(BG);
      layer.fill(0);
      expires.fill(0);
      falling.fill(0);
      clearAllSystems();
      break;
    case 'i':
      invertPalette();
      break;
  }
});

// on mobile (narrow viewport) start with the panel collapsed so the canvas is fully visible
if (window.matchMedia('(max-width: 700px)').matches) {
  setPanel(false);
}

// kick off with stamps so it isn't blank
for (let i = 0; i < 25; i++) spawnOne();
